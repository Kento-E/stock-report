name: Validate Investment Preferences

on:
  push:
    paths:
      - 'data/investment_preferences.toml'
  pull_request:
    paths:
      - 'data/investment_preferences.toml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install tomli

    - name: Validate investment_preferences.toml
      run: |
        python src/validators/validate_preferences.py data/investment_preferences.toml
