name: Validate stocks.toml

on:
  pull_request:
    paths:
      - 'data/**'
  push:
    branches: [ main ]
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate stocks.toml
        id: validate
        run: |
          python src/validators/validate_stocks.py data/stocks.toml

      - name: Validation Summary
        if: always()
        run: |
          echo "## stocks.toml バリデーション結果 📋" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.validate.outcome }}" = "success" ]; then
            echo "✅ 検証成功: stocks.tomlファイルは正しい形式です" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 検証失敗: stocks.tomlファイルにエラーがあります" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "詳細は上記のログを確認してください。" >> $GITHUB_STEP_SUMMARY
          fi
