name: Validate TOML

on:
  pull_request:
    paths:
      - 'data/**/*.toml'
  push:
    branches: [ main ]
    paths:
      - 'data/**/*.toml'

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate TOML files
        id: validate
        run: |
          exit_code=0
          for file in data/*.toml; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              python src/formatters/format_toml.py "$file" || exit_code=1
            fi
          done
          exit $exit_code

      - name: Validation Summary
        if: always()
        run: |
          echo "## TOMLバリデーション結果 🔧" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.validate.outcome }}" = "success" ]; then
            echo "✓ すべてのTOMLファイルは正しい形式です" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ TOMLファイルにエラーがあります" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "詳細は上記のログを確認してください。" >> $GITHUB_STEP_SUMMARY
          fi
